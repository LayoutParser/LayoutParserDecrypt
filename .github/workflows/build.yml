name: LayoutParserDecrypt - Build

on:
  push:
    branches: [ "**" ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Restore (NuGet)
        shell: pwsh
        run: |
          nuget help > $null
          nuget restore .\LayoutParserDecrypt.sln

      - name: Build (Release)
        shell: pwsh
        run: |
          msbuild .\LayoutParserDecrypt.sln /m /p:Configuration=Release /p:Platform="Any CPU"

      - name: Upload artifact (exe)
        uses: actions/upload-artifact@v4
        with:
          name: LayoutParserDecrypt
          path: |
            bin\Release\LayoutParserDecrypt.exe
            bin\Release\LayoutParserDecrypt.exe.config
            # Lib está embutida no exe (fontes locais), não gera DLL separada


