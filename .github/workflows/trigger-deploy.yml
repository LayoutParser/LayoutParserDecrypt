name: Trigger Deploy on LayoutParserApi

on:
  push:
    branches:
      - main
      - master
    paths:
      - '**'
  workflow_dispatch:

jobs:
  trigger-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
    - name: Trigger deploy workflow in LayoutParserApi
      uses: actions/github-script@v7
      with:
        github-token: ${{ secrets.GH_PAT_TOKEN || secrets.GITHUB_TOKEN }}
        script: |
          const owner = 'Elsonc1';
          const repo = 'LayoutParserApi';
          
          try {
            // Primeiro, tentar obter o workflow pelo caminho
            let workflowId = '.github/workflows/deploy.yml';
            
            // Tentar disparar o workflow
            await github.rest.actions.createWorkflowDispatch({
              owner: owner,
              repo: repo,
              workflow_id: workflowId,
              ref: 'main'
            });
            
            console.log('✅ Workflow de deploy acionado no repositório LayoutParserApi');
          } catch (error) {
            // Se falhar, tentar buscar o workflow pelo nome
            console.log('Tentando buscar workflow pelo nome...');
            const workflows = await github.rest.actions.listWorkflowsForRepo({
              owner: owner,
              repo: repo
            });
            
            const deployWorkflow = workflows.data.workflows.find(
              w => w.name === 'Deploy to Production Server' || w.path.includes('deploy.yml')
            );
            
            if (deployWorkflow) {
              await github.rest.actions.createWorkflowDispatch({
                owner: owner,
                repo: repo,
                workflow_id: deployWorkflow.id,
                ref: 'main'
              });
              console.log('✅ Workflow de deploy acionado usando ID do workflow');
            } else {
              throw new Error('Workflow deploy.yml não encontrado no repositório LayoutParserApi');
            }
          }
          
    - name: Wait for deployment (optional)
      run: |
        echo "⏳ Workflow de deploy foi acionado. Verifique o status em:"
        echo "https://github.com/Elsonc1/LayoutParserApi/actions"

